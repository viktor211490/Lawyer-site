<app-header></app-header>

<main class="blog-page">
  <div class="container">
    <h1 class="page-title">Блог</h1>
    <p class="page-subtitle">Статьи о психологии и ментальном здоровье</p>

    <div class="articles-grid">
      @for (article of articles(); track article.id) {
        <a [routerLink]="['/article', article.id]" class="article-card card">
          @if (article.coverImage) {
            <img [src]="article.coverImage" [alt]="article.title" class="article-image">
          }
          <div class="article-content">
            <h3>{{ article.title }}</h3>
            <p class="article-excerpt">{{ article.excerpt }}</p>
            <div class="article-meta">
              <span class="author">{{ article.authorName }}</span>
              <span class="date">{{ formatDate(article.publishedDate!) }}</span>
            </div>
          </div>
        </a>
      }
    </div>

    @if (articles().length === 0) {
      <p class="no-articles">Статей пока нет</p>
    }
  </div>
</main>

<app-footer></app-footer>

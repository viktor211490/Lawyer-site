<div class="admin-layout">

  <main class="admin-content">
    <div class="admin-header">
      <h1>Управление статьями</h1>
      <a routerLink="/admin/article-new" class="btn-primary">+ Новая статья</a>
    </div>

    <div class="articles-table card">
      <table>
        <thead>
          <tr>
            <th>Заголовок</th>
            <th>Статус</th>
            <th>Дата</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody>
          @for (article of articles(); track article.id) {
            <tr>
              <td>{{ article.title }}</td>
              <td>
                <span class="status-badge" [class]="'status-' + getStatusClass(article.status || '')">
                  {{ getStatusName(article.status || '') }}
                </span>
              </td>
              <td>{{ formatDate(article.publishedDate!) }}</td>
              <td class="actions">
                <a [routerLink]="['/admin/article', article.id]" class="action-btn">✎</a>
                <button (click)="toggleVisibility(article.id!)" class="action-btn" title="Видимость">
                  👁
                </button>
                <button (click)="deleteArticle(article.id!)" class="action-btn delete" title="Удалить">🗑</button>
              </td>
            </tr>
          }
        </tbody>
      </table>

      @if (articles().length === 0) {
        <p class="no-articles">Статей пока нет</p>
      }
    </div>
  </main>
</div>

<div class="admin-layout">

  <main class="admin-content">
    <div class="admin-header">
      <h1>{{ isEdit() ? 'Редактирование' : 'Новая статья' }}</h1>
      <a routerLink="/admin/articles" class="btn-secondary">← Назад</a>
    </div>

    <form [formGroup]="articleForm" (ngSubmit)="onSubmit()" class="article-form">
      <div class="form-row">
        <div class="form-group">
          <label for="title">Заголовок *</label>
          <input id="title" formControlName="title" type="text" />
        </div>
      </div>

      <div class="form-group">
        <label for="excerpt">Краткое описание *</label>
        <textarea id="excerpt" formControlName="excerpt" rows="2"></textarea>
      </div>

      <div class="form-group">
        <label>Обложка статьи</label>
        <div class="image-upload" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onDrop($event)">
          <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" hidden />
          @if (coverImagePreview()) {
            <img [src]="coverImagePreview()" alt="Обложка" class="image-preview" />
          } @else {
            <div class="upload-placeholder" (click)="fileInput.click()">
              <span class="upload-icon">📷</span>
              <p>Перетащите изображение сюда или кликните для выбора</p>
              <small>PNG, JPG до 5MB</small>
            </div>
          }
        </div>
      </div>

      <div class="form-group">
        <label for="content">Содержимое *</label>
        <textarea id="content" formControlName="content" rows="15" class="rich-text"></textarea>
      </div>

      <div class="form-group">
        <label for="tags">Теги (через запятую)</label>
        <input id="tags" formControlName="tags" type="text" placeholder="психология, тревожность, советы" />
      </div>

      <div class="form-row">
        <div class="checkbox-group">
          <label>
            <input type="checkbox" formControlName="isPublished" />
            Опубликовать сразу
          </label>
        </div>

        <div class="checkbox-group">
          <label>
            <input type="checkbox" formControlName="isVisibleInBlog" />
            Показывать в блоге
          </label>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="articleForm.invalid">
          {{ isEdit() ? 'Сохранить' : 'Создать' }}
        </button>
        @if (isEdit() && !articleForm.get('isPublished')?.value) {
          <button type="button" class="btn-secondary" (click)="publish()">Опубликовать</button>
        }
      </div>

      @if (message()) {
        <div [class]="messageType() === 'error' ? 'error-message' : 'success-message'">
          {{ message() }}
        </div>
      }
    </form>
  </main>
</div>

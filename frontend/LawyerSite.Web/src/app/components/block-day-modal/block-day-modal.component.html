@if (visible()) {
  <div class="modal-backdrop" (click)="cancel()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Заблокировать день</h3>
        <button class="btn-close" (click)="cancel()">✕</button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label>Дата</label>
          <div class="month-picker">
            <div class="month-nav">
              <button class="nav-btn" type="button" (click)="prevMonth()">&#8249;</button>
              <span class="month-label">{{ currentMonthLabel() }}</span>
              <button class="nav-btn" type="button" (click)="nextMonth()">&#8250;</button>
            </div>

            <div class="month-weekdays">
              @for (wd of weekdays; track wd) {
                <div class="wd">{{ wd }}</div>
              }
            </div>

            <div class="month-days">
              @for (d of monthDays(); track d.dateKey) {
                <button
                  type="button"
                  class="month-day"
                  [class.today]="d.isToday"
                  [class.outside]="d.isOutsideMonth"
                  [class.selected]="d.isSelected"
                  (click)="selectDay(d.dateKey)"
                >
                  <span class="num">{{ d.dayOfMonth }}</span>
                </button>
              }
            </div>

            @if (formData.date) {
              <div class="selected-date-label">
                Выбрано: <strong>{{ formData.date }}</strong>
              </div>
            }
          </div>
        </div>

        <div class="form-group">
          <label>Причина</label>
          <select [(ngModel)]="formData.reason">
            <option value="Vacation">Отпуск</option>
            <option value="Sick">Больничный</option>
            <option value="Personal">Личные дела</option>
            <option value="Other">Другое</option>
          </select>
        </div>

        <div class="form-group">
          <label>Комментарий (необязательно)</label>
          <textarea
            [(ngModel)]="formData.comment"
            rows="3"
            placeholder="Дополнительная информация"
          ></textarea>
        </div>

        <div class="info-box">
          <p>Все записи на этот день будут скрыты, новые записи станут невозможны.</p>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" (click)="cancel()">Отмена</button>
        <button class="btn-primary" (click)="submit()" [disabled]="!isValid()">
          Заблокировать
        </button>
      </div>
    </div>
  </div>
}
